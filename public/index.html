<!DOCTYPE html>
<html>
<head>

<title>Office Spotify Skip</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

/* blurred background */

#bg{
position:fixed;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(60px) brightness(0.4);
transform:scale(1.2);
z-index:-1;
}

/* layout */

.layout{display:flex;}

.side-panel{
width:280px;
background:rgba(0,0,0,0.6);
padding:20px;
height:100vh;
}

.container{
flex:1;
text-align:center;
padding-top:80px;
}

#albumCover{
width:260px;
border-radius:15px;
}

/* progress */

.progress-container{
background:rgba(255,255,255,0.2);
height:10px;
border-radius:10px;
width:320px;
margin:15px auto;
}

#progressBar{
height:100%;
width:0%;
background:#1DB954;
border-radius:10px;
}

/* SKIP BUTTON */

#skipBtn{
background:#1DB954;
border:none;
padding:18px 55px;
border-radius:60px;
font-size:22px;
font-weight:bold;
color:white;
cursor:pointer;
margin-top:20px;
box-shadow:0 0 15px rgba(29,185,84,0.6);
transition:all .2s;
}

#skipBtn:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(29,185,84,0.9);
}

/* admin */

#adminBtn{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:#1DB954;
border:none;
font-size:20px;
cursor:pointer;
}

#adminPanel{
position:fixed;
bottom:90px;
right:20px;
background:#181818;
padding:15px;
border-radius:10px;
display:none;
width:220px;
}

.switch{
width:50px;
height:24px;
background:red;
border-radius:12px;
position:relative;
cursor:pointer;
}

.switch::after{
content:"";
width:20px;
height:20px;
background:white;
border-radius:50%;
position:absolute;
top:2px;
left:2px;
transition:transform .3s;
}

.switch.on{background:#1DB954;}
.switch.on::after{transform:translateX(26px);}

.switch-row{
display:flex;
justify-content:space-between;
align-items:center;
margin:8px 0;
}

#adminMessage{
margin-top:10px;
font-size:13px;
color:#1DB954;
}

/* GIFS */

#cornerGif{
position:fixed;
bottom:20px;
left:20px;
width:140px;
pointer-events:none;
z-index:5;
opacity:.9;
}

#topRightGif{
position:fixed;
top:20px;
right:20px;
width:120px;
pointer-events:none;
z-index:5;
opacity:.95;
}

/* WEATHER PANEL */

#weatherPanel{
position:fixed;
top:20px;
left:340px;
background:rgba(0,0,0,0.65);
padding:14px 16px;
border-radius:10px;
font-size:14px;
text-align:left;
min-width:170px;
  backdrop-filter: blur(10px);
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

/* CURRENCY PANEL */

#currencyPanel{
position:fixed;
bottom:40px;
left:340px;
background:rgba(0,0,0,0.65);
padding:12px 16px;
border-radius:10px;
font-size:14px;
line-height:1.6;
  backdrop-filter: blur(10px);
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<div id="bg"></div>

<img id="cornerGif" src="/dancer.gif">
<img id="topRightGif" src="/penguin.gif">

<div id="weatherPanel">Loading weather...</div>
<div id="currencyPanel">Loading currency...</div>

<div class="layout">

<div class="side-panel">
<h3>Last Skip</h3>
<div id="lastSkipPanel">No skips yet</div>
</div>

<div class="container">

<img id="albumCover">

<h2 id="songTitle">Loading...</h2>

<div id="artistName"></div>

<div class="progress-container">
<div id="progressBar"></div>
</div>

<div id="voteCounter">0 / 0 votes</div>

<button id="skipBtn" onclick="vote()">SKIP</button>

<ul id="voters"></ul>

</div>
</div>

<button id="adminBtn" onclick="toggleAdminPanel()">⚙</button>

<div id="adminPanel">

<div id="loginSection">
<input type="password" id="adminPasswordInput" placeholder="Admin password">
<button onclick="adminLogin()">Login</button>
</div>

<div id="adminControls" style="display:none">

<input id="totalInput" type="number" placeholder="People">
<button onclick="setTotal()">Set People</button>

<div class="switch-row">
<span>Voting</span>
<div id="votingSwitch" class="switch" onclick="toggleVoting()"></div>
</div>

<div class="switch-row">
<span>Ping Sound</span>
<div id="soundSwitch" class="switch" onclick="toggleSound()"></div>
</div>

<h4>Ban User</h4>

<input id="banName" placeholder="Name">
<button onclick="banUser()">Ban</button>
<button onclick="clearVotes()">Clear Votes</button>

<div id="adminMessage"></div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket=io();
const pingSound=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

let userId=localStorage.getItem("userId");
let userName=localStorage.getItem("userName");
let lastCount=0;

if(!userId){
userId=crypto.randomUUID();
localStorage.setItem("userId",userId);
}

if(!userName){
userName=prompt("Enter your name:");
localStorage.setItem("userName",userName);
}

socket.on("voteUpdate",data=>updateUI(data));

function vote(){

fetch("/vote",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId,name:userName})
})
.then(res=>res.json())
.then(updateUI);

}

function updateUI(data){

if(data.count>lastCount && data.soundEnabled){
pingSound.play().catch(()=>{});
}

lastCount=data.count;

document.getElementById("voteCounter").innerText =
data.count+" / "+data.needed+" votes";

const percent=data.needed>0?(data.count/data.needed)*100:0;

document.getElementById("progressBar").style.width =
Math.min(percent,100)+"%";

const list=document.getElementById("voters");
list.innerHTML="";

data.voters.forEach(v=>{
const li=document.createElement("li");
li.innerText=v;
list.appendChild(li);
});

updateSwitch("votingSwitch",data.votingEnabled);
updateSwitch("soundSwitch",data.soundEnabled);

if(data.message){
document.getElementById("adminMessage").innerText=data.message;
}

}

function updateSwitch(id,state){
const el=document.getElementById(id);
state?el.classList.add("on"):el.classList.remove("on");
}

/* WEATHER ICON LOGIC */

function weatherIcon(code){

if(code===0) return "☀️ Clear";
if(code<=3) return "⛅ Cloudy";
if(code<=48) return "🌫 Fog";
if(code<=67) return "🌧 Rain";
if(code<=77) return "❄️ Snow";
if(code>=95) return "⛈ Storm";

return "🌤";

}

/* WEATHER */

async function loadWeather(){

try{

const res = await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=56.95&longitude=24.1&daily=weathercode,temperature_2m_max&hourly=precipitation_probability&current_weather=true&windspeed_unit=kmh&timezone=auto"
);

const data = await res.json();

const current = data.current_weather;
const d = data.daily;

/* rain probability (current hour) */

const rainChance = data.hourly.precipitation_probability[0] || 0;

document.getElementById("weatherPanel").innerHTML=`
<b>Riga, Latvia</b><br>
${weatherIcon(current.weathercode)}<br>
${current.temperature}°C
<br>
Wind ${current.windspeed} km/h<br>
Rain ${rainChance}%
<br><br>
Wed ${d.temperature_2m_max[0]}° ${weatherIcon(d.weathercode[0])}<br>
Thu ${d.temperature_2m_max[1]}° ${weatherIcon(d.weathercode[1])}<br>
Fri ${d.temperature_2m_max[2]}° ${weatherIcon(d.weathercode[2])}
`;

}catch{

document.getElementById("weatherPanel").innerText="Weather unavailable";

}

}

/* CURRENCY */

async function loadCurrency(){

try{

const res = await fetch("https://open.er-api.com/v6/latest/EUR");

const data = await res.json();

const r = data.rates;

document.getElementById("currencyPanel").innerHTML=`
<b>EUR Rates</b><br>
🇬🇧 GBP → ${(1/r.GBP).toFixed(3)}<br>
🇺🇸 USD → ${(1/r.USD).toFixed(3)}<br>
🇵🇱 PLN → ${(1/r.PLN).toFixed(3)}<br>
🇸🇪 SEK → ${(1/r.SEK).toFixed(3)}<br>
🇳🇴 NOK → ${(1/r.NOK).toFixed(3)}<br>
🇩🇰 DKK → ${(1/r.DKK).toFixed(3)}
`;

}catch{

document.getElementById("currencyPanel").innerText="Currency unavailable";

}

}

function loadVotes(){
fetch("/votes").then(res=>res.json()).then(updateUI);
}

function loadSong(){

fetch("/current-song")
.then(res=>res.json())
.then(data=>{

if(!data.title)return;

const parts=data.title.split(" - ");

document.getElementById("songTitle").innerText=parts[0];
document.getElementById("artistName").innerText=parts[1]||"";

if(data.image){
document.getElementById("albumCover").src=data.image;
document.getElementById("bg").style.backgroundImage=`url(${data.image})`;
}

loadVotes();

});

}

function loadLastSkip(){

fetch("/last-skip")
.then(res=>res.json())
.then(data=>{

const panel=document.getElementById("lastSkipPanel");

if(!data){
panel.innerHTML="No skips yet";
return;
}

panel.innerHTML=`
<p><strong>Song:</strong><br>${data.song}</p>
<p><strong>Skipped By:</strong></p>
<ul>${data.skippedBy.map(n=>`<li>${n}</li>`).join("")}</ul>
<p><strong>Time:</strong><br>${data.time}</p>
`;

});

}

function toggleAdminPanel(){
const panel=document.getElementById("adminPanel");
panel.style.display=panel.style.display==="none"?"block":"none";
}

/* LOAD */

loadSong();
loadVotes();
loadLastSkip();
loadWeather();
loadCurrency();

setInterval(loadSong,10000);
setInterval(loadLastSkip,5000);

/* refresh every 15 minutes */

setInterval(loadWeather,900000);
setInterval(loadCurrency,900000);

</script>

</body>
</html>

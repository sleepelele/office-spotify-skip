<!DOCTYPE html>
<html>
<head>

<title>Office Spotify Skip</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

/* blurred background */

#bg{
position:fixed;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(60px) brightness(0.4);
transform:scale(1.2);
z-index:-1;
}

/* layout */

.layout{display:flex;}

.side-panel{
width:280px;
background:rgba(0,0,0,0.6);
padding:20px;
height:100vh;
overflow-y:auto;
}

.container{
flex:1;
text-align:center;
padding-top:80px;
}

#albumCover{
width:260px;
border-radius:15px;
}

/* progress */

.progress-container{
background:rgba(255,255,255,0.2);
height:10px;
border-radius:10px;
width:320px;
margin:15px auto;
}

#progressBar{
height:100%;
width:0%;
background:#1DB954;
border-radius:10px;
}

/* SKIP BUTTON */

#skipBtn{
background:#1DB954;
border:none;
padding:18px 55px;
border-radius:60px;
font-size:22px;
font-weight:bold;
color:white;
cursor:pointer;
margin-top:20px;
box-shadow:0 0 15px rgba(29,185,84,0.6);
transition:all .2s;
}

#skipBtn:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(29,185,84,0.9);
}

/* widgets */

.widget{
margin-top:20px;
padding:10px;
background:rgba(0,0,0,0.4);
border-radius:10px;
}

.widget h4{
margin:0 0 8px 0;
color:#1DB954;
}

.forecast-day{
font-size:13px;
margin:3px 0;
}

/* admin */

#adminBtn{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:#1DB954;
border:none;
font-size:20px;
cursor:pointer;
}

#adminPanel{
position:fixed;
bottom:90px;
right:20px;
background:#181818;
padding:15px;
border-radius:10px;
display:none;
width:220px;
}

.switch{
width:50px;
height:24px;
background:red;
border-radius:12px;
position:relative;
cursor:pointer;
}

.switch::after{
content:"";
width:20px;
height:20px;
background:white;
border-radius:50%;
position:absolute;
top:2px;
left:2px;
transition:transform .3s;
}

.switch.on{background:#1DB954;}
.switch.on::after{transform:translateX(26px);}

.switch-row{
display:flex;
justify-content:space-between;
align-items:center;
margin:8px 0;
}

#adminMessage{
margin-top:10px;
font-size:13px;
color:#1DB954;
}

/* GIFS */

#cornerGif{
position:fixed;
bottom:20px;
left:20px;
width:140px;
pointer-events:none;
z-index:5;
opacity:.9;
}

#topRightGif{
position:fixed;
top:20px;
right:20px;
width:120px;
pointer-events:none;
z-index:5;
opacity:.95;
}

</style>
</head>

<body>

<div id="bg"></div>

<img id="cornerGif" src="/dancer.gif">
<img id="topRightGif" src="/penguin.gif">

<div class="layout">

<div class="side-panel">

<h3>Last Skip</h3>
<div id="lastSkipPanel">No skips yet</div>

<div class="widget">
<h4>Weather</h4>
<div id="weatherNow">Loading...</div>
<div id="weatherForecast"></div>
</div>

<div class="widget">
<h4>Currency → EUR</h4>
<div id="currencyWidget">Loading...</div>
</div>

</div>

<div class="container">

<img id="albumCover">

<h2 id="songTitle">Loading...</h2>

<div id="artistName"></div>

<div class="progress-container">
<div id="progressBar"></div>
</div>

<div id="voteCounter">0 / 0 votes</div>

<button id="skipBtn" onclick="vote()">SKIP</button>

<ul id="voters"></ul>

</div>
</div>

<button id="adminBtn" onclick="toggleAdminPanel()">⚙</button>

<div id="adminPanel">

<div id="loginSection">

<input type="password" id="adminPasswordInput" placeholder="Admin password">
<button onclick="adminLogin()">Login</button>

</div>

<div id="adminControls" style="display:none">

<input id="totalInput" type="number" placeholder="People">
<button onclick="setTotal()">Set People</button>

<div class="switch-row">
<span>Voting</span>
<div id="votingSwitch" class="switch" onclick="toggleVoting()"></div>
</div>

<div class="switch-row">
<span>Ping Sound</span>
<div id="soundSwitch" class="switch" onclick="toggleSound()"></div>
</div>

<h4>Connected Users</h4>
<ul id="userList"></ul>

<h4>Ban User</h4>

<input id="banName" placeholder="Name">

<button onclick="banUser()">Ban</button>
<button onclick="clearVotes()">Clear Votes</button>

<div id="adminMessage"></div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

/* EXISTING CODE UNCHANGED */

const socket=io();

const pingSound=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

let userId=localStorage.getItem("userId");
let userName=localStorage.getItem("userName");
let lastCount=0;

if(!userId){
userId=crypto.randomUUID();
localStorage.setItem("userId",userId);
}

if(!userName){
userName=prompt("Enter your name:");
localStorage.setItem("userName",userName);
}

socket.on("voteUpdate",data=>updateUI(data));
socket.emit("registerUser", {userId, name:userName});

/* WEATHER */

function loadWeather(){

fetch("/weather")
.then(res=>res.json())
.then(data=>{

document.getElementById("weatherNow").innerText =
data.temp+"°C • wind "+data.wind+" km/h";

const forecast=document.getElementById("weatherForecast");
forecast.innerHTML="";

data.forecast.forEach(day=>{
const div=document.createElement("div");
div.className="forecast-day";
div.innerText=day.date+"  "+day.temp+"°C";
forecast.appendChild(div);
});

});

}

/* CURRENCY */

function loadCurrency(){

fetch("/currency")
.then(res=>res.json())
.then(data=>{

document.getElementById("currencyWidget").innerHTML=`
GBP → EUR: ${data.GBP}<br>
PLN → EUR: ${data.PLN}<br>
USD → EUR: ${data.USD}<br>
NOK → EUR: ${data.NOK}<br>
SEK → EUR: ${data.SEK}<br>
DKK → EUR: ${data.DKK}
`;

});

}

/* existing loaders */

function loadVotes(){
fetch("/votes").then(res=>res.json()).then(updateUI);
}

function loadSong(){

fetch("/current-song")
.then(res=>res.json())
.then(data=>{

if(!data.title)return;

const parts=data.title.split(" - ");

document.getElementById("songTitle").innerText=parts[0];
document.getElementById("artistName").innerText=parts[1]||"";

if(data.image){
document.getElementById("albumCover").src=data.image;
document.getElementById("bg").style.backgroundImage=`url(${data.image})`;
}

loadVotes();

});

}

/* intervals */

loadSong();
loadVotes();
loadLastSkip();
loadWeather();
loadCurrency();

setInterval(loadSong,10000);
setInterval(loadLastSkip,5000);
setInterval(loadWeather,600000);
setInterval(loadCurrency,600000);

</script>

</body>
</html>
